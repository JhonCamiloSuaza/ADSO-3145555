spring:
  application:
    name: exercise-api

  # ---- Conexión a Base de Datos ----
  datasource:
    url: jdbc:postgresql://localhost:5437/Bd_exercise_api
    username: postgres
    password: camilo200804
    driver-class-name: org.postgresql.Driver

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      ddl-auto: none  # Liquibase gestiona el esquema
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# ---- Servidor ----
server:
  port: 8080

# ---- SpringDoc / Swagger ----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
