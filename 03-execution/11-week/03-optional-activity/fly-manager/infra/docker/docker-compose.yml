services:
  postgres:
    image: postgres:16
    container_name: fly-bd-pg-5435
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flydb}
      POSTGRES_USER: ${POSTGRES_USER:-fly_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fly_admin_123}
      TZ: ${TZ:-America/Bogota}
      PGTZ: ${PGTZ:-America/Bogota}
    ports:
      - "5435:5432"
    volumes:
      - fly_bd_pgdata:/var/lib/postgresql/data
      # Carga deterministica gestionada por infra/docker/recrear_instalacion_limpia.ps1
      # (DDL + seeds + validaciones), sin depender de initdb automatico.
      # Workspace de trabajo manual (psql \i ...)
      - ../../db/ddl:/workspace/ddl:ro
      - ../../db/seeds:/workspace/seeds
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fly_admin} -d ${POSTGRES_DB:-flydb}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  fly_bd_pgdata:
