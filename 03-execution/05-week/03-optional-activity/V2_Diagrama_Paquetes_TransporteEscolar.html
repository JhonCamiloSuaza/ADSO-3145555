<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diagrama de Paquetes – Transporte Escolar v2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap');
:root { --bg:#0b0d13; --surf:#12151e; --bord:#1c2030; --text:#dde3f0; --muted:#3d4a6a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; overflow:hidden; height:100vh; }
#bar { position:fixed; top:0; left:0; right:0; height:46px; z-index:300; background:rgba(11,13,19,.97); border-bottom:1px solid var(--bord); display:flex; align-items:center; gap:14px; padding:0 20px; }
#bar h1 { font-family:'Syne',sans-serif; font-size:13px; letter-spacing:2px; color:#00d4ff; text-transform:uppercase; }
.pill { font-size:9px; padding:2px 8px; border-radius:2px; border:1px solid var(--bord); color:var(--muted); letter-spacing:1px; }
.btns { margin-left:auto; display:flex; gap:6px; }
.btn { background:var(--surf); border:1px solid var(--bord); color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:10px; padding:4px 10px; cursor:pointer; border-radius:2px; transition:all .15s; }
.btn:hover { border-color:#00d4ff; color:#00d4ff; }
#wrap { position:fixed; top:46px; left:0; right:0; bottom:0; overflow:hidden; cursor:grab; }
#wrap.dragging { cursor:grabbing; }
#stage { position:absolute; transform-origin:0 0; }
#legend { position:fixed; bottom:14px; left:14px; z-index:300; background:rgba(18,21,30,.97); border:1px solid var(--bord); border-radius:4px; padding:12px 16px; font-size:9px; color:var(--muted); display:flex; flex-direction:column; gap:7px; }
.lg { display:flex; align-items:center; gap:9px; }
.lc { width:14px; height:14px; border-radius:2px; flex-shrink:0; }
.la { display:flex; align-items:center; gap:9px; padding-top:6px; border-top:1px solid var(--bord); }
</style>
</head>
<body>
<div id="bar">
  <h1>Diagrama de Paquetes · Transporte Escolar</h1>
  <span class="pill">UML · v2.0</span>
  <div class="btns">
    <button class="btn" onclick="zIn()">＋ Zoom</button>
    <button class="btn" onclick="zOut()">－ Zoom</button>
    <button class="btn" onclick="zReset()">Reset</button>
    <button class="btn" onclick="zFit()">Fit</button>
  </div>
</div>
<div id="legend">
  <div class="lg"><div class="lc" style="background:#00d4ff22;border:1.5px solid #00d4ff"></div>Core – Usuarios</div>
  <div class="lg"><div class="lc" style="background:#10b98122;border:1.5px solid #10b981"></div>Ruta / GPS</div>
  <div class="lg"><div class="lc" style="background:#f9731622;border:1.5px solid #f97316"></div>Notificaciones</div>
  <div class="lg"><div class="lc" style="background:#a78bfa22;border:1.5px solid #a78bfa"></div>Seguridad &amp; Roles</div>
  <div class="lg"><div class="lc" style="background:#fb718522;border:1.5px solid #fb7185"></div>Auditoría</div>
  <div class="la"><svg width="32" height="10"><line x1="0" y1="5" x2="32" y2="5" stroke="#aaa" stroke-width="1.5" stroke-dasharray="5,3"/></svg>«use»</div>
  <div class="la"><svg width="32" height="10"><line x1="0" y1="5" x2="26" y2="5" stroke="#aaa" stroke-width="1.5"/><polygon points="26,2 32,5 26,8" fill="#aaa"/></svg>«import»</div>
</div>
<div id="wrap"><div id="stage"><svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg></div></div>
<script>
const NS='http://www.w3.org/2000/svg', svg=document.getElementById('diagram');
function mk(tag,a={},t=''){const e=document.createElementNS(NS,tag);Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));if(t)e.textContent=t;return e;}

const ROW_H=48, PAD=22, TAB_H=26;

const PKGS=[
  { id:'core',  name:'Core',                    stereo:'«module»', color:'#00d4ff', x:80,   y:100, w:500,
    tables:[
      {name:'usuario',    note:'tipousuario: Padre | Admin | Conductor'},
      {name:'conductor',  note:'Perfil extendido del usuario → usuarioid FK'},
      {name:'estudiante', note:'Hijo registrado por el padre → usuarioid FK'},
    ]
  },
  { id:'notif', name:'Notificaciones',           stereo:'«module»', color:'#f97316', x:80,   y:600, w:500,
    tables:[
      {name:'notificacion',        note:'Evento generado por trayecto o usuario'},
      {name:'notificacion_recibe', note:'N:M receptores → notificacionid, receptorid'},
      {name:'confignotificacion',  note:'Preferencias de alerta por usuario (1:1)'},
    ]
  },
  { id:'route', name:'Ruta & GPS',               stereo:'«module»', color:'#10b981', x:700,  y:100, w:520,
    tables:[
      {name:'ruta',                note:'Definición de la ruta escolar'},
      {name:'vehiculo',            note:'Bus asignado a la ruta → rutaid FK'},
      {name:'parada',              note:'Puntos de recogida → rutaid FK'},
      {name:'trayecto',            note:'Recorrido activo → rutaid, conductorid, vehiculoid'},
      {name:'trayecto_estudiante', note:'Pasajeros N:M → trayectoid, estudianteid'},
      {name:'coordenadas',         note:'Coordenadas GPS del conductor → trayectoid FK'},
    ]
  },
  { id:'sec',   name:'Seguridad & Roles',        stereo:'«module»', color:'#a78bfa', x:1340, y:100, w:520,
    tables:[
      {name:'roles',                   note:'Roles: Admin | Padre | Conductor'},
      {name:'permisos',                note:'Permisos granulares por funcionalidad'},
      {name:'usuario_rol',             note:'N:M → usuarioid, rolid'},
      {name:'rol_permiso',             note:'N:M → rolid, permisoid'},
      {name:'politicas_contrasenas',   note:'Reglas: longitud, símbolos, caducidad'},
      {name:'configuracion_seguridad', note:'Parámetros globales del sistema'},
    ]
  },
  { id:'audit', name:'Auditoría & Trazabilidad', stereo:'«module»', color:'#fb7185', x:1340, y:640, w:520,
    tables:[
      {name:'auditoria',      note:'Registro de acciones del usuario'},
      {name:'sesion_usuario', note:'Control de sesiones → usuarioid FK'},
      {name:'registro',       note:'Log de acciones → usuarioid FK'},
      {name:'log_errores',    note:'Errores capturados → usuarioid FK'},
    ]
  },
];

PKGS.forEach(p=>{ p.h = TAB_H + PAD + p.tables.length*ROW_H + PAD; });

const maxX=Math.max(...PKGS.map(p=>p.x+p.w))+80;
const maxY=Math.max(...PKGS.map(p=>p.y+p.h))+80;
svg.setAttribute('width',maxX); svg.setAttribute('height',maxY);

const PKG_BOX={};

function drawPkgs(){
  PKGS.forEach(p=>{
    PKG_BOX[p.id]={x:p.x,y:p.y,w:p.w,h:p.h};
    const g=mk('g');

    // pestaña
    const tw=p.name.length*8.5+28;
    g.appendChild(mk('rect',{x:p.x,y:p.y-TAB_H,width:tw,height:TAB_H,rx:'3',fill:p.color+'1a',stroke:p.color,'stroke-width':'2'}));
    g.appendChild(mk('text',{x:p.x+tw/2,y:p.y-TAB_H/2,fill:p.color,'font-size':'12','font-weight':'700','text-anchor':'middle','dominant-baseline':'middle','font-family':'Syne,sans-serif','letter-spacing':'0.5'},p.name));

    // cuerpo
    g.appendChild(mk('rect',{x:p.x,y:p.y,width:p.w,height:p.h,rx:'3',fill:p.color+'08',stroke:p.color,'stroke-width':'2'}));

    // estereotipo
    g.appendChild(mk('text',{x:p.x+p.w/2,y:p.y+16,fill:p.color+'66','font-size':'9','font-style':'italic','text-anchor':'middle','dominant-baseline':'middle','font-family':'JetBrains Mono,monospace'},p.stereo));

    // separador
    g.appendChild(mk('line',{x1:p.x+PAD,y1:p.y+32,x2:p.x+p.w-PAD,y2:p.y+32,stroke:p.color+'44','stroke-width':'1'}));

    // tablas
    p.tables.forEach((t,i)=>{
      const ty=p.y+32+PAD/2+i*ROW_H+ROW_H/2;

      // fila alternada
      g.appendChild(mk('rect',{x:p.x+PAD-6,y:ty-ROW_H/2+4,width:p.w-PAD*2+12,height:ROW_H-8,rx:'3',fill:i%2===0?p.color+'0b':'transparent'}));

      // icono
      g.appendChild(mk('text',{x:p.x+PAD+2,y:ty-6,fill:p.color+'99','font-size':'13','dominant-baseline':'middle','font-family':'JetBrains Mono,monospace'},'▭'));

      // nombre
      g.appendChild(mk('text',{x:p.x+PAD+24,y:ty-6,fill:p.color,'font-size':'12','font-weight':'600','dominant-baseline':'middle','font-family':'JetBrains Mono,monospace'},t.name));

      // nota
      g.appendChild(mk('text',{x:p.x+PAD+24,y:ty+12,fill:p.color+'60','font-size':'9','dominant-baseline':'middle','font-family':'JetBrains Mono,monospace'},t.note));
    });

    svg.appendChild(g);
  });
}

function borderPt(box,tx,ty){
  const cx=box.x+box.w/2,cy=box.y+box.h/2;
  const dx=tx-cx,dy=ty-cy,hw=box.w/2,hh=box.h/2;
  const sx=Math.abs(dx)/hw,sy=Math.abs(dy)/hh;
  return sx>sy
    ?{x:cx+Math.sign(dx)*hw,y:cy+dy/sx}
    :{x:cx+dx/sy,y:cy+Math.sign(dy)*hh};
}

const DEPS=[
  {from:'route', to:'core',  type:'import', label:'«import»'},
  {from:'notif', to:'core',  type:'import', label:'«import»'},
  {from:'notif', to:'route', type:'import', label:'«import»'},
  {from:'sec',   to:'core',  type:'import', label:'«import»'},
  {from:'audit', to:'core',  type:'import', label:'«import»'},
  {from:'audit', to:'sec',   type:'use',    label:'«use»'},
  {from:'route', to:'notif', type:'use',    label:'«use»'},
];

const COL={core:'#00d4ff',route:'#10b981',notif:'#f97316',sec:'#a78bfa',audit:'#fb7185'};

function drawDeps(){
  const defs=mk('defs');
  Object.entries(COL).forEach(([id,col])=>{
    ['import','use'].forEach(type=>{
      const mar=mk('marker',{id:`m-${type}-${id}`,markerWidth:'10',markerHeight:'7',refX:'9',refY:'3.5',orient:'auto'});
      mar.appendChild(mk('polygon',{points:'0,0 9,3.5 0,7',fill:type==='import'?col:'none',stroke:col,'stroke-width':'1.2'}));
      defs.appendChild(mar);
    });
  });
  svg.insertBefore(defs,svg.firstChild);

  DEPS.forEach(d=>{
    const aB=PKG_BOX[d.from],bB=PKG_BOX[d.to];
    if(!aB||!bB)return;
    const col=COL[d.from]||'#aaa';
    const s=borderPt(aB,bB.x+bB.w/2,bB.y+bB.h/2);
    const e=borderPt(bB,aB.x+aB.w/2,aB.y+aB.h/2);
    const dx=e.x-s.x,dy=e.y-s.y;
    const cx1=s.x+dx*0.5,cy1=s.y;
    const cx2=e.x-dx*0.5,cy2=e.y;

    svg.appendChild(mk('path',{d:`M${s.x},${s.y} C${cx1},${cy1} ${cx2},${cy2} ${e.x},${e.y}`,fill:'none',stroke:col,'stroke-width':'2','stroke-dasharray':d.type==='use'?'9,4':'none','marker-end':`url(#m-${d.type}-${d.from})`,opacity:'.8'}));

    // etiqueta
    const lx=(s.x+e.x)/2,ly=(s.y+e.y)/2;
    const lw=d.label.length*6.8+16;
    svg.appendChild(mk('rect',{x:lx-lw/2,y:ly-12,width:lw,height:18,rx:'3',fill:'#0b0d13',stroke:col+'66','stroke-width':'1.2'}));
    svg.appendChild(mk('text',{x:lx,y:ly,fill:col,'font-size':'10','font-style':'italic','font-weight':'700','text-anchor':'middle','dominant-baseline':'middle','font-family':'JetBrains Mono,monospace'},d.label));
  });
}

drawPkgs();
drawDeps();

// PAN & ZOOM
const stage=document.getElementById('stage'),wrap=document.getElementById('wrap');
let px=30,py=50,sc=0.52,pan=false,sx0,sy0,px0,py0;
function applyT(){stage.style.transform=`translate(${px}px,${py}px) scale(${sc})`;}
applyT();
wrap.addEventListener('mousedown',e=>{pan=true;sx0=e.clientX;sy0=e.clientY;px0=px;py0=py;wrap.classList.add('dragging');});
document.addEventListener('mousemove',e=>{if(!pan)return;px=px0+(e.clientX-sx0);py=py0+(e.clientY-sy0);applyT();});
document.addEventListener('mouseup',()=>{pan=false;wrap.classList.remove('dragging');});
wrap.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?0.9:1.1,r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;px=mx-(mx-px)*d;py=my-(my-py)*d;sc=Math.min(3,Math.max(0.08,sc*d));applyT();},{passive:false});
function zIn(){sc=Math.min(3,sc*1.2);applyT();}
function zOut(){sc=Math.max(0.08,sc/1.2);applyT();}
function zReset(){px=30;py=50;sc=0.52;applyT();}
function zFit(){const W=wrap.clientWidth,H=wrap.clientHeight;sc=Math.min(W/maxX,H/maxY)*0.92;px=(W-maxX*sc)/2;py=(H-maxY*sc)/2;applyT();}
</script>
</body>
</html>
