* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; overflow:hidden; font-family:'Segoe UI',sans-serif; }

}
#topbar h1 { color:#fff; font-size:14px; font-weight:600; letter-spacing:1px; }
.tag { font-size:10px; padding:2px 8px; border-radius:2px; background:#222; color:#aaa; border:1px solid #444; }
.controls { margin-left:auto; display:flex; gap:8px; }
.btn { background:#222; border:1px solid #444; color:#ccc; font-size:11px; padding:4px 12px; cursor:pointer; border-radius:2px; }
.btn:hover { border-color:#fff; color:#fff; }

#wrap { position:fixed; top:44px; left:0; right:0; bottom:0; overflow:hidden; cursor:grab; }
#wrap.dragging { cursor:grabbing; }

#stage { position:absolute; transform-origin:0 0; }

svg#diagram { display:block; }

/* ── SHAPES ── */
.entity rect   { fill:#1e1e1e; stroke:#fff; stroke-width:1.5; }
.entity text   { fill:#fff; font-size:13px; font-weight:600; text-anchor:middle; dominant-baseline:middle; }

.relation polygon { fill:#1e1e1e; stroke:#fff; stroke-width:1.5; }
.relation text    { fill:#fff; font-size:11px; text-anchor:middle; dominant-baseline:middle; }

.attribute ellipse { fill:#1e1e1e; stroke:#fff; stroke-width:1.2; }
.attribute text    { fill:#fff; font-size:10px; text-anchor:middle; dominant-baseline:middle; }

.attr-pk ellipse { stroke-width:2.5; }
.attr-pk text    { font-weight:700; }

line.edge, path.edge { stroke:#fff; stroke-width:1.2; fill:none; }

.card { fill:#aaa; font-size:10px; text-anchor:middle; dominant-baseline:middle; }
</style>
</head>

// ═══════════════════════════════════════════════════
// BUILD SVG
// ═══════════════════════════════════════════════════
const svg = document.getElementById('diagram');
const NS  = 'http://www.w3.org/2000/svg';

function el(tag, attrs={}, text='') {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  if (text) e.textContent = text;
  return e;
}

// compute bounding box
let maxX = 0, maxY = 0;
NODES.forEach(n => { maxX=Math.max(maxX,n.x+200); maxY=Math.max(maxY,n.y+200); });
svg.setAttribute('width',  maxX + 100);
svg.setAttribute('height', maxY + 100);

// node center lookup
const center = {};
NODES.forEach(n => { center[n.id] = { x:n.x, y:n.y }; });

// ── DRAW EDGES (behind shapes) ──
const edgeGroup = el('g', { id:'edges' });
svg.appendChild(edgeGroup);

EDGES.forEach(e => {
  const a = center[e.from], b = center[e.to];
  if (!a || !b) return;
  const line = el('line', {
    x1:a.x, y1:a.y, x2:b.x, y2:b.y,
    stroke:'#fff', 'stroke-width':'1.2'
  });
  edgeGroup.appendChild(line);

  // cardinality labels
  const MID_OFFSET = 22;
  if (e.card1) {
    const t = el('text', {
      x: a.x + (b.x-a.x)*0.2,
      y: a.y + (b.y-a.y)*0.2 - 8,
      fill:'#ccc', 'font-size':'10', 'text-anchor':'middle', 'font-family':'Segoe UI'
    }, e.card1);
    edgeGroup.appendChild(t);
  }
  if (e.card2) {
    const t = el('text', {
      x: a.x + (b.x-a.x)*0.8,
      y: a.y + (b.y-a.y)*0.8 - 8,
      fill:'#ccc', 'font-size':'10', 'text-anchor':'middle', 'font-family':'Segoe UI'
    }, e.card2);
    edgeGroup.appendChild(t);
  }
});

// ── DRAW NODES ──
const nodeGroup = el('g', { id:'nodes' });
svg.appendChild(nodeGroup);

NODES.forEach(n => {
  const g = el('g', { class: n.type + (n.pk?' attr-pk':''), 'data-id':n.id });

  if (n.type === 'entity') {
    const hw = EW/2, hh = EH/2;
    g.appendChild(el('rect', { x:n.x-hw, y:n.y-hh, width:EW, height:EH, rx:0 }));
    g.appendChild(el('text', { x:n.x, y:n.y, 'font-family':'Segoe UI', 'font-size':'13', 'font-weight':'600', fill:'#fff', 'text-anchor':'middle', 'dominant-baseline':'middle' }, n.label));
  }
  else if (n.type === 'relation') {
    const pts = `${n.x},${n.y-RH} ${n.x+RW},${n.y} ${n.x},${n.y+RH} ${n.x-RW},${n.y}`;
    g.appendChild(el('polygon', { points:pts }));
    g.appendChild(el('text', { x:n.x, y:n.y, 'font-family':'Segoe UI', 'font-size':'11', fill:'#fff', 'text-anchor':'middle', 'dominant-baseline':'middle' }, n.label));
  }
  else if (n.type === 'attr') {
    // double ellipse for PK
    if (n.pk) {
      g.appendChild(el('ellipse', { cx:n.x, cy:n.y, rx:AW/2+4, ry:AH/2+4 }));
    }
    g.appendChild(el('ellipse', { cx:n.x, cy:n.y, rx:AW/2, ry:AH/2 }));
    g.appendChild(el('text', { x:n.x, y:n.y, 'font-family':'Segoe UI', 'font-size':'10',
      fill:'#fff', 'text-anchor':'middle', 'dominant-baseline':'middle',
      'font-weight': n.pk?'700':'400',
      'text-decoration': n.pk?'underline':'none'
    }, n.label));
  }

  nodeGroup.appendChild(g);
});

// ═══════════════════════════════════════════════════
// PAN & ZOOM
// ═══════════════════════════════════════════════════
const stage = document.getElementById('stage');
const wrap  = document.getElementById('wrap');
let px=20, py=20, scale=0.52;
let panning=false, sx,sy,sox,soy;

function applyT() {
  stage.style.transform = `translate(${px}px,${py}px) scale(${scale})`;
}
applyT();

wrap.addEventListener('mousedown', e => {
  panning=true; sx=e.clientX; sy=e.clientY; sox=px; soy=py;
  wrap.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (!panning) return;
  px=sox+(e.clientX-sx); py=soy+(e.clientY-sy); applyT();
});
document.addEventListener('mouseup', () => { panning=false; wrap.classList.remove('dragging'); });
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const d=e.deltaY>0?0.9:1.1;
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  px=mx-(mx-px)*d; py=my-(my-py)*d;
  scale=Math.min(3,Math.max(0.1,scale*d)); applyT();
},{passive:false});

function zoom(f) { scale=Math.min(3,Math.max(0.1,scale*f)); applyT(); }
function resetView() { px=20; py=20; scale=0.52; applyT(); }
function fitView() {
  const W=wrap.clientWidth, H=wrap.clientHeight;
  scale=Math.min(W/maxX, H/maxY)*0.88;
  px=(W-maxX*scale)/2; py=(H-maxY*scale)/2; applyT();
}
</script>
</body>
