<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MER – Transporte Escolar v2.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap');

:root {
  --bg:      #0c0e14;
  --surface: #13161f;
  --border:  #222840;
  --line:    #2a3050;
  --text:    #e2e8f0;
  --muted:   #5a6585;
  --pk:      #fbbf24;
  --fk:      #60a5fa;
  --col:     #94a3b8;
  --type:    #4a5a7a;

  /* group accent colours */
  --c-core:  #00d4ff;
  --c-route: #10b981;
  --c-notif: #f97316;
  --c-sec:   #a78bfa;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; overflow:hidden; height:100vh; }

/* ── TOP BAR ── */
#bar {
  position:fixed; top:0; left:0; right:0; height:46px; z-index:300;
  background:rgba(12,14,20,.97); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:16px; padding:0 18px;
  backdrop-filter:blur(8px);
}
#bar h1 { font-family:'Syne',sans-serif; font-size:14px; letter-spacing:2px; color:var(--c-core); text-transform:uppercase; }
.pill { font-size:9px; padding:2px 8px; border-radius:2px; border:1px solid var(--border); color:var(--muted); letter-spacing:1px; }

.legend { display:flex; gap:14px; margin-left:auto; }
.leg { display:flex; align-items:center; gap:5px; font-size:9px; color:var(--muted); }
.ld { width:10px; height:10px; border-radius:1px; }

.btns { display:flex; gap:6px; }
.btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:10px; padding:4px 10px; cursor:pointer; border-radius:2px; transition:all .15s; }
.btn:hover { border-color:var(--c-core); color:var(--c-core); }

/* ── CANVAS ── */
#wrap { position:fixed; top:46px; left:0; right:0; bottom:0; overflow:hidden; cursor:grab; }
#wrap.dragging { cursor:grabbing; }
#stage { position:absolute; transform-origin:0 0; }
#svg-lines { position:absolute; top:0; left:0; pointer-events:none; }

/* ── TABLE CARDS ── */
.tbl {
  position:absolute;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  min-width:200px;
  box-shadow:0 2px 20px rgba(0,0,0,.5);
  font-size:10px;
  cursor:move;
  transition:box-shadow .2s;
}
.tbl:hover { box-shadow:0 0 0 1px var(--accent,#fff4), 0 4px 24px rgba(0,0,0,.6); }

.tbl-head {
  padding:7px 10px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:7px;
  border-left:3px solid var(--accent,#fff);
}
.tbl-name { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.5px; color:var(--accent,#fff); flex:1; }
.tbl-tag  { font-size:8px; color:var(--muted); border:1px solid var(--border); padding:1px 5px; border-radius:1px; }

.tbl-body { padding:4px 0; }
.row {
  display:grid; grid-template-columns:20px 1fr auto;
  gap:4px; align-items:center;
  padding:2px 10px;
  color:var(--col);
  border-bottom:1px solid transparent;
}
.row:hover { background:rgba(255,255,255,.03); }
.row.pk { color:var(--pk); }
.row.fk { color:var(--fk); }
.row.pkfk { color:var(--pk); } /* PK + FK */
.ico { font-size:9px; text-align:center; }
.cname { white-space:nowrap; }
.ctype { color:var(--type); font-size:9px; white-space:nowrap; }
.row.pk .ctype { color:#92754a; }
.row.fk .ctype { color:#365a8a; }

/* separator line inside table */
.sep { border-top:1px solid var(--border); margin:3px 0; }

/* ── RELATION LINES ── */
.rel { fill:none; stroke-width:1.4; opacity:.7; }
.rel-label { font-size:9px; font-family:'JetBrains Mono',monospace; }
</style>
</head>
<body>

<div id="bar">
  <h1>MER · Transporte Escolar</h1>
  <span class="pill">v2.0 · PostgreSQL</span>
  <div class="legend">
    <div class="leg"><div class="ld" style="background:var(--c-core)"></div>Core</div>
    <div class="leg"><div class="ld" style="background:var(--c-route)"></div>Ruta/GPS</div>
    <div class="leg"><div class="ld" style="background:var(--c-notif)"></div>Notificaciones</div>
    <div class="leg"><div class="ld" style="background:var(--c-sec)"></div>Seguridad</div>
  </div>
  <div class="btns">
    <button class="btn" onclick="zIn()">＋</button>
    <button class="btn" onclick="zOut()">－</button>
    <button class="btn" onclick="zReset()">Reset</button>
    <button class="btn" onclick="zFit()">Fit</button>
  </div>
</div>

<div id="wrap">
  <div id="stage">
    <svg id="svg-lines"></svg>
    <!-- tables injected by JS -->
  </div>
</div>

// ═══════════════════════════════════════════════════
// GROUP COLOURS
// ═══════════════════════════════════════════════════
const GC = { core:'#00d4ff', route:'#10b981', notif:'#f97316', sec:'#a78bfa' };

// ═══════════════════════════════════════════════════
// BUILD DOM
// ═══════════════════════════════════════════════════
const stage = document.getElementById('stage');
const svgEl = document.getElementById('svg-lines');
const NS = 'http://www.w3.org/2000/svg';

// map id → { el, x, y }
const tblMap = {};

function buildTables() {
  TABLES.forEach(t => {
    const color = GC[t.group];
    const div = document.createElement('div');
    div.className = 'tbl';
    div.id = 'tbl-' + t.id;
    div.style.setProperty('--accent', color);
    div.style.left = t.x + 'px';
    div.style.top  = t.y + 'px';

    // header
    const head = document.createElement('div');
    head.className = 'tbl-head';
    head.innerHTML = `<span class="tbl-name">${t.label}</span><span class="tbl-tag">${t.group}</span>`;
    div.appendChild(head);

    // body
    const body = document.createElement('div');
    body.className = 'tbl-body';

    // separator after PKs
    let pastPk = false;
    t.cols.forEach((c, i) => {
      if (!c.pk && !pastPk && i > 0) {
        pastPk = true;
        const sep = document.createElement('div');
        sep.className = 'sep';
        body.appendChild(sep);
      }

      const row = document.createElement('div');
      const cls = (c.pk && c.fk) ? 'pkfk' : c.pk ? 'pk' : c.fk ? 'fk' : '';
      row.className = 'row ' + cls;

      const icon = c.pk ? '🔑' : c.fk ? '🔗' : '·';
      const noteHtml = c.note ? `<span style="color:#3a4a6a;margin-left:4px">${c.note}</span>` : '';

      row.innerHTML = `
        <span class="ico">${icon}</span>
        <span class="cname">${c.name}${noteHtml}</span>
        <span class="ctype">${c.type}</span>`;

      if (c.fk) row.title = '→ ' + c.fk;
      body.appendChild(row);
    });

    div.appendChild(body);
    stage.appendChild(div);
    tblMap[t.id] = { el: div, data: t };

    makeDraggable(div, t);
  });
}

// ═══════════════════════════════════════════════════
// LINES
// ═══════════════════════════════════════════════════
function getBox(id) {
  const m = tblMap[id];
  if (!m) return null;
  const el = m.el;
  return {
    x: parseFloat(el.style.left),
    y: parseFloat(el.style.top),
    w: el.offsetWidth,
    h: el.offsetHeight,
  };
}

function closestEdge(a, b) {
  // returns {x1,y1,x2,y2} connecting closest edges of two boxes
  const acx = a.x + a.w/2, acy = a.y + a.h/2;
  const bcx = b.x + b.w/2, bcy = b.y + b.h/2;
  const dx = bcx - acx, dy = bcy - acy;

  let x1, y1, x2, y2;

  if (Math.abs(dx) > Math.abs(dy)) {
    // horizontal dominant
    if (dx > 0) { x1=a.x+a.w; x2=b.x; }
    else         { x1=a.x;     x2=b.x+b.w; }
    y1 = Math.min(Math.max(bcy, a.y+6), a.y+a.h-6);
    y2 = Math.min(Math.max(acy, b.y+6), b.y+b.h-6);
  } else {
    // vertical dominant
    if (dy > 0) { y1=a.y+a.h; y2=b.y; }
    else         { y1=a.y;     y2=b.y+b.h; }
    x1 = Math.min(Math.max(bcx, a.x+6), a.x+a.w-6);
    x2 = Math.min(Math.max(acy < bcy ? acx : acx, b.x+6), b.x+b.w-6);
    x2 = Math.min(Math.max(acx, b.x+6), b.x+b.w-6);
  }
  return { x1, y1, x2, y2 };
}

function svgEl2(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  return e;
}

function drawLines() {
  svgEl.innerHTML = '';
  let mw=0, mh=0;
  TABLES.forEach(t => {
    const b = getBox(t.id);
    if (b) { mw=Math.max(mw,b.x+b.w+100); mh=Math.max(mh,b.y+b.h+100); }
  });
  svgEl.setAttribute('width', mw+200);
  svgEl.setAttribute('height',mh+200);

  RELATIONS.forEach(r => {
    const a = getBox(r.from), b = getBox(r.to);
    if (!a || !b) return;

    const {x1,y1,x2,y2} = closestEdge(a,b);
    const color = GC[TABLES.find(t=>t.id===r.from)?.group] || '#fff';

    // bezier path
    const dx=x2-x1, dy=y2-y1;
    const cx1=x1+dx*0.35, cy1=y1;
    const cx2=x2-dx*0.35, cy2=y2;

    const path = svgEl2('path', {
      d:`M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`,
      fill:'none', stroke:color, 'stroke-width':'1.4', opacity:'.5'
    });
    svgEl.appendChild(path);

    // ── Cardinalidad lado FROM (cerca del origen) ──
    const fromRatio = 0.12;
    const fx = x1 + (x2-x1)*fromRatio;
    const fy = y1 + (y2-y1)*fromRatio;
    // offset perpendicular para que no tape la línea
    const len = Math.sqrt((x2-x1)**2+(y2-y1)**2)||1;
    const nx = -(y2-y1)/len*10, ny = (x2-x1)/len*10;

    const bgFrom = svgEl2('rect',{
      x:fx+nx-10, y:fy+ny-9, width:20, height:13, rx:2,
      fill:'#0c0e14', opacity:'.85'
    });
    svgEl.appendChild(bgFrom);
    const tFrom = svgEl2('text',{
      x:fx+nx, y:fy+ny+1,
      fill:color, 'font-size':'11', 'font-weight':'700',
      'text-anchor':'middle','dominant-baseline':'middle',
      'font-family':'JetBrains Mono,monospace'
    });
    tFrom.textContent = r.card || '';
    svgEl.appendChild(tFrom);

    // ── Cardinalidad lado TO (cerca del destino) ──
    const toRatio = 0.88;
    const tx2 = x1 + (x2-x1)*toRatio;
    const ty2 = y1 + (y2-y1)*toRatio;

    const bgTo = svgEl2('rect',{
      x:tx2+nx-10, y:ty2+ny-9, width:20, height:13, rx:2,
      fill:'#0c0e14', opacity:'.85'
    });
    svgEl.appendChild(bgTo);
    const tTo = svgEl2('text',{
      x:tx2+nx, y:ty2+ny+1,
      fill:color, 'font-size':'11', 'font-weight':'700',
      'text-anchor':'middle','dominant-baseline':'middle',
      'font-family':'JetBrains Mono,monospace'
    });
    tTo.textContent = r.card2 || '';
    svgEl.appendChild(tTo);

    // ── Etiqueta relación en el punto medio ──
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const bgMid = svgEl2('rect',{
      x:mx-38, y:my-9, width:76, height:13, rx:2,
      fill:'#0c0e14', opacity:'.85'
    });
    svgEl.appendChild(bgMid);
    const txt = svgEl2('text',{
      x:mx, y:my+1, fill:color, 'font-size':'8',
      'text-anchor':'middle','dominant-baseline':'middle',
      'font-family':'JetBrains Mono,monospace', opacity:'.85'
    });
    txt.textContent = r.label;
    svgEl.appendChild(txt);
  });
}

// ═══════════════════════════════════════════════════
// DRAG TABLES
// ═══════════════════════════════════════════════════
function makeDraggable(el, data) {
  let startX, startY, startL, startT, dragging=false;
  el.addEventListener('mousedown', e => {
    if (e.button!==0) return;
    dragging=true;
    startX=e.clientX; startY=e.clientY;
    startL=parseFloat(el.style.left); startT=parseFloat(el.style.top);
    e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    el.style.left = (startL+(e.clientX-startX)/curScale)+'px';
    el.style.top  = (startT+(e.clientY-startY)/curScale)+'px';
    drawLines();
  });
  document.addEventListener('mouseup', ()=>{ dragging=false; });
}

// ═══════════════════════════════════════════════════
// PAN & ZOOM
// ═══════════════════════════════════════════════════
const wrap = document.getElementById('wrap');
let panX=20, panY=20, curScale=0.52;
let panning=false, sx,sy,sox,soy;

function applyT() {
  stage.style.transform=`translate(${panX}px,${panY}px) scale(${curScale})`;
}
applyT();

wrap.addEventListener('mousedown',e=>{
  if(e.target!==wrap&&e.target!==stage&&e.target.id!=='svg-lines') return;
  panning=true; sx=e.clientX; sy=e.clientY; sox=panX; soy=panY;
  wrap.classList.add('dragging');
});
document.addEventListener('mousemove',e=>{
  if(!panning) return;
  panX=sox+(e.clientX-sx); panY=soy+(e.clientY-sy); applyT();
});
document.addEventListener('mouseup',()=>{ panning=false; wrap.classList.remove('dragging'); });
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const d=e.deltaY>0?0.9:1.1;
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  panX=mx-(mx-panX)*d; panY=my-(my-panY)*d;
  curScale=Math.min(3,Math.max(0.1,curScale*d));
  applyT();
},{passive:false});

function zIn()    { curScale=Math.min(3,curScale*1.2); applyT(); }
function zOut()   { curScale=Math.max(0.1,curScale/1.2); applyT(); }
function zReset() { panX=20;panY=20;curScale=0.52; applyT(); }
function zFit() {
  let mx=0,my=0;
  TABLES.forEach(t=>{ const b=getBox(t.id); if(b){mx=Math.max(mx,b.x+b.w);my=Math.max(my,b.y+b.h);} });
  const W=wrap.clientWidth, H=wrap.clientHeight;
  curScale=Math.min(W/mx,H/my)*0.88;
  panX=(W-mx*curScale)/2; panY=(H-my*curScale)/2;
  applyT();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildTables();
setTimeout(()=>{ drawLines(); },120);
window.addEventListener('resize', drawLines);
</script>
